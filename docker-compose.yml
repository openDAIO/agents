x-daio-app: &daio-app
  image: daio-agents:local
  build:
    context: .
    dockerfile: Dockerfile
  init: true
  volumes:
    - ./.deployments:/app/deployments:ro

x-agent-common: &agent-common
  <<: *daio-app
  restart: unless-stopped
  entrypoint: ["/app/docker/agent-entrypoint.sh"]
  depends_on:
    content-service:
      condition: service_healthy
  volumes:
    - ./.deployments:/app/deployments:ro
    - ./.state:/app/state

x-agent-runtime-env: &agent-runtime-env
  RPC_BATCH_MAX_COUNT: ${RPC_BATCH_MAX_COUNT:-1}
  RPC_READ_RETRIES: ${RPC_READ_RETRIES:-5}
  RPC_READ_RETRY_BASE_MS: ${RPC_READ_RETRY_BASE_MS:-500}
  RPC_TX_WAIT_RETRIES: ${RPC_TX_WAIT_RETRIES:-8}
  RPC_TX_WAIT_RETRY_BASE_MS: ${RPC_TX_WAIT_RETRY_BASE_MS:-1000}
  DAIO_TX_FINALITY_CONFIRMATIONS: ${DAIO_TX_FINALITY_CONFIRMATIONS:-1}
  DAIO_TX_FINALITY_WAIT_TIMEOUT_MS: ${DAIO_TX_FINALITY_WAIT_TIMEOUT_MS:-300000}
  DAIO_DOCUMENT_WAIT_MS: ${DAIO_DOCUMENT_WAIT_MS:-300000}
  DAIO_DOCUMENT_RETRY_INITIAL_MS: ${DAIO_DOCUMENT_RETRY_INITIAL_MS:-1000}
  DAIO_DOCUMENT_RETRY_MAX_MS: ${DAIO_DOCUMENT_RETRY_MAX_MS:-10000}
  DAIO_DOCUMENT_RECHECK_MS: ${DAIO_DOCUMENT_RECHECK_MS:-10000}
  DAIO_MIN_COMMIT_TIME_REMAINING_MS: ${DAIO_MIN_COMMIT_TIME_REMAINING_MS:-120000}
  DAIO_FALLBACK_PHASE_TIMEOUT_MS: ${DAIO_FALLBACK_PHASE_TIMEOUT_MS:-600000}
  DAIO_EVENT_LOOKBACK_BLOCKS: ${DAIO_EVENT_LOOKBACK_BLOCKS:-7200}
  DAIO_EVENT_REORG_DEPTH_BLOCKS: ${DAIO_EVENT_REORG_DEPTH_BLOCKS:-12}
  DAIO_KEEPER_RECONCILE_INTERVAL_MS: ${DAIO_KEEPER_RECONCILE_INTERVAL_MS:-10000}
  DAIO_KEEPER_SYNC_ACTIVE_REQUESTS: ${DAIO_KEEPER_SYNC_ACTIVE_REQUESTS:-true}
  DAIO_KEEPER_SYNC_MAX_PER_TICK: ${DAIO_KEEPER_SYNC_MAX_PER_TICK:-8}
  DAIO_GLOBAL_KEEPER_PRIVATE_KEY: ${DAIO_KEEPER_PRIVATE_KEY:-}
  DAIO_START_NEXT_REQUEST_GAS_FLOOR: ${DAIO_START_NEXT_REQUEST_GAS_FLOOR:-300000}
  DAIO_SYNC_REQUEST_GAS_FLOOR: ${DAIO_SYNC_REQUEST_GAS_FLOOR:-2000000}
  LLM_RESPONSE_CACHE_TTL_SECONDS: ${LLM_RESPONSE_CACHE_TTL_SECONDS:-0}
  LLM_RESPONSE_CACHE_MAX_ENTRIES: ${LLM_RESPONSE_CACHE_MAX_ENTRIES:-4096}
  LLM_RESPONSE_CACHE_DB_PATH: ${LLM_RESPONSE_CACHE_DB_PATH:-}
  LLM_RETRY_ATTEMPTS: ${LLM_RETRY_ATTEMPTS:-3}
  LLM_RETRY_BASE_MS: ${LLM_RETRY_BASE_MS:-1000}
  LLM_RETRY_MAX_MS: ${LLM_RETRY_MAX_MS:-8000}

services:
  content-service:
    <<: *daio-app
    restart: unless-stopped
    entrypoint: ["/app/docker/content-entrypoint.sh"]
    environment:
      RPC_URL: ${RPC_URL:?set RPC_URL in .env}
      CONTENT_SERVICE_HOST: 0.0.0.0
      CONTENT_SERVICE_PORT: "18002"
      CONTENT_DB_PATH: /app/data/content.sqlite
      CONTENT_DEPLOYMENT_PATH: ""
      CONTENT_CHAIN_RPC_URL: ${RPC_URL:?set RPC_URL in .env}
      RPC_URLS: ${RPC_URLS:-}
      CONTENT_CHAIN_RPC_URLS: ${CONTENT_CHAIN_RPC_URLS:-}
      RPC_FAILOVER_STALL_TIMEOUT_MS: ${RPC_FAILOVER_STALL_TIMEOUT_MS:-750}
      RPC_FAILOVER_QUORUM: ${RPC_FAILOVER_QUORUM:-1}
      RPC_FAILOVER_EVENT_QUORUM: ${RPC_FAILOVER_EVENT_QUORUM:-1}
      RPC_FAILOVER_EVENT_WORKERS: ${RPC_FAILOVER_EVENT_WORKERS:-3}
      RPC_FAILOVER_CACHE_TIMEOUT_MS: ${RPC_FAILOVER_CACHE_TIMEOUT_MS:-250}
      RPC_BATCH_MAX_COUNT: ${RPC_BATCH_MAX_COUNT:-1}
      RPC_READ_RETRIES: ${RPC_READ_RETRIES:-5}
      RPC_READ_RETRY_BASE_MS: ${RPC_READ_RETRY_BASE_MS:-500}
      RPC_TX_WAIT_RETRIES: ${RPC_TX_WAIT_RETRIES:-8}
      RPC_TX_WAIT_RETRY_BASE_MS: ${RPC_TX_WAIT_RETRY_BASE_MS:-1000}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-Content-Type,Authorization,X-Requested-With,X-Filename}
      CORS_EXPOSE_HEADERS: ${CORS_EXPOSE_HEADERS:-Content-Length,Content-Type}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-86400}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      CONTENT_RELAYER_PRIVATE_KEY: ${CONTENT_RELAYER_PRIVATE_KEY:-}
      CONTENT_RELAYER_CONFIRMATIONS: ${CONTENT_RELAYER_CONFIRMATIONS:-1}
      CONTENT_REQUIRE_AGENT_SIGNATURES: ${CONTENT_REQUIRE_AGENT_SIGNATURES:-true}
      CONTENT_AGENT_QA_HISTORY_WINDOW: ${CONTENT_AGENT_QA_HISTORY_WINDOW:-3}
      DAIO_TX_FINALITY_CONFIRMATIONS: ${DAIO_TX_FINALITY_CONFIRMATIONS:-1}
      DAIO_TX_FINALITY_WAIT_TIMEOUT_MS: ${DAIO_TX_FINALITY_WAIT_TIMEOUT_MS:-300000}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-120000}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-low}
      LLM_PROPOSAL_CHAR_BUDGET: ${LLM_PROPOSAL_CHAR_BUDGET:-16000}
      LLM_RESPONSE_CACHE_TTL_SECONDS: ${LLM_RESPONSE_CACHE_TTL_SECONDS:-0}
      LLM_RESPONSE_CACHE_MAX_ENTRIES: ${LLM_RESPONSE_CACHE_MAX_ENTRIES:-4096}
      LLM_RESPONSE_CACHE_DB_PATH: ${LLM_RESPONSE_CACHE_DB_PATH_CONTENT:-/app/data/llm-response-cache.sqlite}
      LLM_RETRY_ATTEMPTS: ${LLM_RETRY_ATTEMPTS:-3}
      LLM_RETRY_BASE_MS: ${LLM_RETRY_BASE_MS:-1000}
      LLM_RETRY_MAX_MS: ${LLM_RETRY_MAX_MS:-8000}
      DAIO_DEPLOYMENT_FILE: ${DAIO_DEPLOYMENT_FILE:-sepolia.json}
      DAIO_DEPLOYMENT_JSON: ${DAIO_DEPLOYMENT_JSON:-}
      DAIO_DEPLOYMENT_JSON_B64: ${DAIO_DEPLOYMENT_JSON_B64:-}
    ports:
      - "${CONTENT_SERVICE_BIND:-127.0.0.1}:${CONTENT_SERVICE_PORT:-18002}:18002"
    volumes:
      - ./.deployments:/app/deployments:ro
      - ./.data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  markitdown:
    image: daio-markitdown:local
    build:
      context: .
      dockerfile: docker/markitdown-server.Dockerfile
    init: true
    restart: unless-stopped
    environment:
      MARKITDOWN_HOST: 0.0.0.0
      MARKITDOWN_PORT: "18003"
      MARKITDOWN_MAX_UPLOAD_BYTES: ${MARKITDOWN_MAX_UPLOAD_BYTES:-52428800}
      MARKITDOWN_ENABLE_PLUGINS: ${MARKITDOWN_ENABLE_PLUGINS:-false}
      MARKITDOWN_CACHE_DB_PATH: ${MARKITDOWN_CACHE_DB_PATH:-/app/data/markitdown-cache.sqlite}
      MARKITDOWN_CACHE_TTL_SECONDS: ${MARKITDOWN_CACHE_TTL_SECONDS:-0}
      MARKITDOWN_CACHE_MAX_ENTRIES: ${MARKITDOWN_CACHE_MAX_ENTRIES:-4096}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET,POST,OPTIONS}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-Content-Type,Authorization,X-Requested-With,X-Filename}
      CORS_EXPOSE_HEADERS: ${CORS_EXPOSE_HEADERS:-Content-Length,Content-Type}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-86400}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
    ports:
      - "${MARKITDOWN_BIND:-127.0.0.1}:${MARKITDOWN_PORT:-18003}:18003"
    volumes:
      - ./.data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport sys, urllib.request\ntry:\n    urllib.request.urlopen('http://127.0.0.1:18003/health', timeout=3)\nexcept Exception:\n    sys.exit(1)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  agent-1:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_1
        required: false
    environment:
      <<: *agent-runtime-env
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R1
      AGENT_STATE_DIR: /app/state/agent-1
      DAIO_AGENT_PARTICIPATION_ENABLED: ${DAIO_AGENT_PARTICIPATION_ENABLED_AGENT_1:-true}
      DAIO_KEEPER_ENABLED: ${DAIO_KEEPER_ENABLED_AGENT_1:-true}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE_AGENT_1:-0.0}
      AGENT_PERSONA: |
        Methodologist persona. You weight statistical rigor, reproducibility, and ablation
        coverage above all else. You score conservatively; only well-supported claims earn
        high marks. You quickly flag missing baselines, weak sample sizes, p-hacking risk,
        and unverifiable empirical claims. Lean toward "borderline" or "weak_reject" when
        methodology is shaky, even if the central idea is interesting. Your overall
        proposalScore should usually sit BELOW the midpoint unless evidence is unusually
        strong, and high confidence requires hard numbers, not narrative.

  agent-2:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_2
        required: false
    environment:
      <<: *agent-runtime-env
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R2
      AGENT_STATE_DIR: /app/state/agent-2
      DAIO_AGENT_PARTICIPATION_ENABLED: ${DAIO_AGENT_PARTICIPATION_ENABLED_AGENT_2:-true}
      DAIO_KEEPER_ENABLED: ${DAIO_KEEPER_ENABLED_AGENT_2:-false}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE_AGENT_2:-0.7}
      AGENT_PERSONA: |
        Novelty-seeking persona. You weight originality, conceptual leap, and the
        boldness of the central idea above polish. Methodological gaps are forgivable
        when the core idea opens a new direction. You score generously and lean toward
        "accept" or "weak_accept" when the proposal is genuinely fresh, and you penalize
        incrementalism harshly. Your overall proposalScore tends to land ABOVE the
        midpoint when there is even one clear novel contribution.

  agent-3:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_3
        required: false
    environment:
      <<: *agent-runtime-env
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R3
      AGENT_STATE_DIR: /app/state/agent-3
      DAIO_AGENT_PARTICIPATION_ENABLED: ${DAIO_AGENT_PARTICIPATION_ENABLED_AGENT_3:-false}
      DAIO_KEEPER_ENABLED: ${DAIO_KEEPER_ENABLED_AGENT_3:-false}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE_AGENT_3:-0.3}
      AGENT_PERSONA: |
        Pragmatic engineer persona. You weight practical impact, implementation quality,
        real-world applicability, and operations/maintenance realism. You are skeptical
        of purely theoretical proposals with no plausible deployment path. You credit
        shipped code, realistic benchmarks, cost analysis, and explicit risk discussion.
        You penalize work that is elegant on paper but unlikely to survive production.
        Recommendations cluster around "weak_accept" / "borderline" unless deployability
        is clearly demonstrated.

  agent-4:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_4
        required: false
    environment:
      <<: *agent-runtime-env
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R4
      AGENT_STATE_DIR: /app/state/agent-4
      DAIO_AGENT_PARTICIPATION_ENABLED: ${DAIO_AGENT_PARTICIPATION_ENABLED_AGENT_4:-true}
      DAIO_KEEPER_ENABLED: ${DAIO_KEEPER_ENABLED_AGENT_4:-false}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE_AGENT_4:-0.15}
      AGENT_PERSONA: |
        Theory-first persona. You weight mathematical formalism, proofs, stated
        assumptions, and internal logical consistency above experiments. You forgive
        weak empirics if the underlying theory is sound and clearly written. You
        penalize hand-wavy formalism, undefined symbols, missing assumptions, and
        circular justifications, and you are unforgiving of category errors. You can
        score very high on theoretical contributions and very low on theory-shaped
        work that is actually informal.

  agent-5:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_5
        required: false
    environment:
      <<: *agent-runtime-env
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R5
      AGENT_STATE_DIR: /app/state/agent-5
      DAIO_AGENT_PARTICIPATION_ENABLED: ${DAIO_AGENT_PARTICIPATION_ENABLED_AGENT_5:-true}
      DAIO_KEEPER_ENABLED: ${DAIO_KEEPER_ENABLED_AGENT_5:-false}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE_AGENT_5:-0.5}
      AGENT_PERSONA: |
        Communication-and-framing persona. You weight clarity, narrative structure,
        motivation, and how well the artifact frames its problem and contribution.
        You penalize jargon, buried claims, missing limitations sections, and
        disorganized presentation even when the underlying work is solid. You reward
        crisp writing, well-chosen examples, and explicit scope statements. Treat
        "can a peer easily understand, act on, and reproduce the contribution?" as a
        primary criterion. Strong content with poor framing ends up "borderline".
