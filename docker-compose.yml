x-daio-app: &daio-app
  image: daio-agents:local
  build:
    context: .
    dockerfile: Dockerfile
  init: true
  volumes:
    - ./.deployments:/app/deployments:ro

x-agent-common: &agent-common
  <<: *daio-app
  restart: unless-stopped
  entrypoint: ["/app/docker/agent-entrypoint.sh"]
  depends_on:
    content-service:
      condition: service_healthy
  volumes:
    - ./.deployments:/app/deployments:ro
    - ./.state:/app/state

services:
  content-service:
    <<: *daio-app
    restart: unless-stopped
    entrypoint: ["/app/docker/content-entrypoint.sh"]
    environment:
      RPC_URL: ${RPC_URL:?set RPC_URL in .env}
      CONTENT_SERVICE_HOST: 0.0.0.0
      CONTENT_SERVICE_PORT: "18002"
      CONTENT_DB_PATH: /app/data/content.sqlite
      CONTENT_DEPLOYMENT_PATH: ""
      CONTENT_CHAIN_RPC_URL: ${RPC_URL:?set RPC_URL in .env}
      RPC_URLS: ${RPC_URLS:-}
      CONTENT_CHAIN_RPC_URLS: ${CONTENT_CHAIN_RPC_URLS:-}
      RPC_FAILOVER_STALL_TIMEOUT_MS: ${RPC_FAILOVER_STALL_TIMEOUT_MS:-750}
      RPC_FAILOVER_QUORUM: ${RPC_FAILOVER_QUORUM:-1}
      RPC_FAILOVER_EVENT_QUORUM: ${RPC_FAILOVER_EVENT_QUORUM:-1}
      RPC_FAILOVER_EVENT_WORKERS: ${RPC_FAILOVER_EVENT_WORKERS:-2}
      RPC_FAILOVER_CACHE_TIMEOUT_MS: ${RPC_FAILOVER_CACHE_TIMEOUT_MS:-250}
      CONTENT_RELAYER_PRIVATE_KEY: ${CONTENT_RELAYER_PRIVATE_KEY:-}
      CONTENT_RELAYER_CONFIRMATIONS: ${CONTENT_RELAYER_CONFIRMATIONS:-1}
      CONTENT_REQUIRE_AGENT_SIGNATURES: ${CONTENT_REQUIRE_AGENT_SIGNATURES:-true}
      DAIO_DEPLOYMENT_FILE: ${DAIO_DEPLOYMENT_FILE:-sepolia.json}
      DAIO_DEPLOYMENT_JSON: ${DAIO_DEPLOYMENT_JSON:-}
      DAIO_DEPLOYMENT_JSON_B64: ${DAIO_DEPLOYMENT_JSON_B64:-}
    ports:
      - "${CONTENT_SERVICE_BIND:-127.0.0.1}:${CONTENT_SERVICE_PORT:-18002}:18002"
    volumes:
      - ./.deployments:/app/deployments:ro
      - ./.data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  markitdown:
    image: daio-markitdown:local
    build:
      context: .
      dockerfile: docker/markitdown-server.Dockerfile
    init: true
    restart: unless-stopped
    environment:
      MARKITDOWN_HOST: 0.0.0.0
      MARKITDOWN_PORT: "18003"
      MARKITDOWN_MAX_UPLOAD_BYTES: ${MARKITDOWN_MAX_UPLOAD_BYTES:-52428800}
      MARKITDOWN_ENABLE_PLUGINS: ${MARKITDOWN_ENABLE_PLUGINS:-false}
    ports:
      - "${MARKITDOWN_BIND:-127.0.0.1}:${MARKITDOWN_PORT:-18003}:18003"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport sys, urllib.request\ntry:\n    urllib.request.urlopen('http://127.0.0.1:18003/health', timeout=3)\nexcept Exception:\n    sys.exit(1)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  agent-1:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_1
        required: false
    environment:
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R1
      AGENT_STATE_DIR: /app/state/agent-1

  agent-2:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_2
        required: false
    environment:
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R2
      AGENT_STATE_DIR: /app/state/agent-2

  agent-3:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_3
        required: false
    environment:
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R3
      AGENT_STATE_DIR: /app/state/agent-3

  agent-4:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_4
        required: false
    environment:
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R4
      AGENT_STATE_DIR: /app/state/agent-4

  agent-5:
    <<: *agent-common
    env_file:
      - path: ./.env.agent_5
        required: false
    environment:
      CONTENT_SERVICE_URL: http://content-service:18002
      AGENT_LABEL: R5
      AGENT_STATE_DIR: /app/state/agent-5
